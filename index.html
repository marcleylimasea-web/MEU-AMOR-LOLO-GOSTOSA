<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meu Amor</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #4b0f1a, #2a0810);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* CAIXA PRINCIPAL */
.container {
    background: rgba(0,0,0,0.3);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* FOTO COM MOLDURA */
.foto {
    width: 200px;
    height: 200px;
    margin: 0 auto 20px;
    border-radius: 20px;
    padding: 5px;
    background: linear-gradient(45deg, #ff4d6d, #8b1e3f);
}

.foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
}

/* TEXTO */
h1 {
    margin: 10px 0;
}

.texto {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 25px;
}

/* BOTÃO */
button {
    background: #8b1e3f;
    border: none;
    padding: 12px 25px;
    color: white;
    font-size: 14px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #b32d57;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

    <!-- FOTO -->
    <div class="foto">
       <img src="./IMG_20220710_173545.jpg">
    </div>

    <!-- TEXTO -->
    <h1>Meu amor 💖</h1>

    <div class="texto">
 Eu não entendo, quanto mais tento falar de você, vejo que palavras não são suficientes.
            Pode estar o caos, mas tudo fica melhor quando é com você.
Isso aqui é só um pedacinho do quanto você é importante pra mim, e nada aqui é comparado com sua beleza.
    </div>

    <!-- BOTÃO -->
    <button onclick="surpresa()">Tem algo aqui…</button>

</div>

<script>
function surpresa() {
    window.location.href = "https://youtu.be/-UWUTfbCW2c?si=-MpCbmR2DnI9s75s";
}
</script>

</body>
</html>
